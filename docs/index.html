<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sponsor Tiles</title>
  <style>
    :root {
      --gap: 14px;
      --tile-bg: #0f172a;
      --tile-border: #1e293b;
      --tile-hover: #1e3a8a;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --shadow: 0 10px 30px rgba(15, 23, 42, 0.35);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", sans-serif;
      background: radial-gradient(circle at 20% 20%, rgba(59, 130, 246, 0.2), transparent 30%),
                  radial-gradient(circle at 80% 10%, rgba(99, 102, 241, 0.25), transparent 28%),
                  #0b1221;
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px;
    }

    .page {
      width: min(1100px, 100%);
      text-align: center;
    }

    h1 {
      margin: 0 0 6px;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    p.helper {
      margin: 0 0 20px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    ul.tile-list {
      list-style: none;
      display: flex;
      flex-wrap: wrap;
      gap: var(--gap);
      padding: 0;
      margin: 0;
      justify-content: center;
    }

    ul.tile-list li {
      --size: 128px;
      flex: 0 0 var(--size);
      width: var(--size);
      height: var(--size);
    }

    ul.tile-list a {
      display: grid;
      place-items: center;
      height: 100%;
      width: 100%;
      text-decoration: none;
      color: var(--text);
      background: linear-gradient(145deg, var(--tile-bg), #0b1221);
      border: 1px solid var(--tile-border);
      border-radius: 12px;
      box-shadow: var(--shadow);
      transition: transform 150ms ease, box-shadow 150ms ease, border-color 150ms ease, background 150ms ease;
      text-align: center;
      padding: 8px;
      font-weight: 600;
    }

    ul.tile-list a .roles {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    ul.tile-list a .role {
      display: block;
      font-size: 0.82rem;
      color: var(--muted);
      padding-bottom: 6px;
      border-bottom: 1px solid var(--tile-border);
    }

    ul.tile-list a .role:last-child {
      border-bottom: none;
      padding-bottom: 0;
    }

    ul.tile-list a .name {
      display: block;
      font-size: 0.98rem;
      margin-top: 8px;
    }

    ul.tile-list a:hover, ul.tile-list a:focus-visible {
      transform: translateY(-2px);
      box-shadow: 0 18px 35px rgba(37, 99, 235, 0.35);
      border-color: var(--tile-hover);
      background: linear-gradient(145deg, rgba(37, 99, 235, 0.15), rgba(14, 165, 233, 0.08));
      outline: none;
    }

    .role-row {
      margin-top: 14px;
    }

    .role-row .role-title {
      font-size: 0.9rem;
      color: var(--muted);
      margin: 0 0 8px;
    }

    .role-row .role-title strong {
      color: var(--text);
      font-weight: 700;
    }

    @media (max-width: 540px) {
      body { padding: 22px; }
      ul.tile-list { gap: 10px; }
    }
  </style>
</head>
<body>
  <main class="page">
    <h1>Support the organization</h1>
    <ul id="sponsor-list" class="tile-list">
      <li><a href="https://github.com/sponsors/MCEngine" target="_blank" rel="noopener noreferrer"><span class="name">GitHub Sponsors</span></a></li>
      <li><a href="https://opencollective.com/MCEngine" target="_blank" rel="noopener noreferrer"><span class="name">Open Collective</span></a></li>
    </ul>

    <hr style="margin: 28px auto 18px; max-width: 320px; border: 0; border-top: 1px solid var(--tile-border);">

    <section aria-labelledby="developers-title">
      <h2 id="developers-title" style="margin: 0 0 10px; font-size: 1.15rem; color: var(--text);">Developers</h2>
      <div class="role-row">
        <p class="role-title"><strong>Owner</strong></p>
        <ul class="tile-list" style="justify-content: center;">
          <li><a href="https://jetsadawijit.github.io/donation-website/" target="_blank" rel="noopener noreferrer"><span class="roles"><span class="role">Owner</span></span><span class="name">JetsadaWijit</span></a></li>
        </ul>
      </div>
    </section>
  </main>

  <script>
    (function () {
      const list = document.getElementById('sponsor-list');

      function applyTriangleLayout() {
        const items = Array.from(list.children);
        let index = 0;
        let cols = 1;

        items.forEach((item) => item.style.removeProperty('--cols'));

        while (index < items.length) {
          for (let i = 0; i < cols && index < items.length; i += 1) {
            items[index].style.setProperty('--cols', cols);
            index += 1;
          }
          cols += 1;
        }
      }

      const observer = new MutationObserver(applyTriangleLayout);
      observer.observe(list, { childList: true });

      window.addEventListener('resize', applyTriangleLayout);
      applyTriangleLayout();
    })();
  </script>
</body>
</html>
